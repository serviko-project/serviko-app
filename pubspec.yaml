name: serviko_app
description: "Serviko mobile application built with Flutter, supporting both
  customer and provider roles in a unified app. It enables users to discover
  services, book appointments, make secure payments and communicate in real time
  via chat, audio and video calls, with AI-powered recommendations and booking
  assistance."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies
dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.9.2
  equatable: ^2.0.8
  file_picker: ^10.3.8
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_map: ^8.3.0
  flutter_svg: ^2.2.4
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  hugeicons: ^1.1.6
  image_picker: ^1.2.1
  connectivity_plus: ^6.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  latlong2: ^0.9.1
  lottie: ^3.3.2
  permission_handler: ^12.0.1
  pinput: ^6.0.2
  path_provider: ^2.1.5
  pdf: ^3.12.0
  razorpay_flutter: ^1.4.5
  shared_preferences: ^2.5.5
  skeletonizer: ^2.1.3
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  zego_uikit_prebuilt_call: ^4.23.3
  zego_uikit_signaling_plugin: ^2.8.21
  zego_zimkit: ^1.19.9
  fl_chart: ^1.2.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

dependency_overrides:
  intl: 0.20.2

# Dev Dependencies
dev_dependencies:
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.1

# Assets & Flutter config
flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
    - assets/images/
    - assets/images/social_media_icons/
    - assets/lottie/
    - assets/lottie/onboarding/
    - assets/icons/
    - assets/svg/

# ---- Native Splash Configuration ----
flutter_native_splash:
  color: "#6C3CE1"
  image: assets/images/app_logo_splash.png
  android_12:
    color: "#6C3CE1"
    image: assets/images/app_logo_splash.png

# ---- Launcher Icons Configuration ----
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#6C3CE1"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
