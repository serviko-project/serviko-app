name: serviko_app
description: "Serviko mobile application built with Flutter, supporting both customer and provider roles in a unified app. It enables users to discover services, book appointments, make secure payments and communicate in real time via chat, audio and video calls, with AI-powered recommendations and booking assistance."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.2.0
  equatable: ^2.0.8
  dartz: ^0.10.1
  dio: ^5.9.2
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  internet_connection_checker_plus: ^2.9.1+2
  json_annotation: ^4.11.0

# Dev Dependencies
dev_dependencies:
  flutter_test:
    sdk: flutter  
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

# Assets & Flutter config
flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
    - assets/images/
    - assets/icons/
    - assets/svg/
